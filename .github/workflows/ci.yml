name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      #- name: Ruff
      #  run: |
      #    ruff check .

      #- name: MyPy
      #  run: |
      #    mypy src

      - name: Pytest
        run: |
          pytest -p no:cov

      - name: Project Analysis Agent
        run: |
          python tools/project_analysis_agent.py .
          python tools/project_analysis_agent.py . --json > project-analysis-agent-report.json
          python -m json.tool project-analysis-agent-report.json > /dev/null

      - name: Upload Project Analysis Agent Report
        uses: actions/upload-artifact@v4
        with:
          name: project-analysis-agent-report
          path: project-analysis-agent-report.json
          if-no-files-found: error
